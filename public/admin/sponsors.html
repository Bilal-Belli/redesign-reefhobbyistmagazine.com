<!DOCTYPE html>
<html>

  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-87FCYMD0DT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-87FCYMD0DT');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin – Sponsors</title>
    <link rel="icon" type="image/png" href="/img/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style/admin.css" />
  </head>

  <body class="bg-light">
    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
      <div class="container">
        <a class="navbar-brand" href="/admin"><img src="../img/logo.jpg" alt="Magazine Logo" class="img-fluid"></a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div id="nav" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item btn btn-outline-warning btn-sm mx-4"><a class="nav-link active" href="/admin">Admin Home</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- ================= DASHBOARD ================= -->
    <div class="container-fluid px-4 py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🤝 Manage Sponsors</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
          Add Sponsor
        </button>
      </div>
      <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
              <table class="table table-bordered table-hover align-middle mb-2">
                <thead class="table-dark">
                  <tr>
                    <th>Logo</th>
                    <th>Title</th>
                    <th>Website</th>
                    <th>Status</th>
                    <th>Last Updated</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="sponsorTable"></tbody>
              </table>
            </div>
            <!-- Pagination -->
            <nav aria-label="Sponsors pagination">
                <ul class="pagination justify-content-center mb-0" id="pagination"></ul>
            </nav>
        </div>
      </div>
    </div>

    <!-- ================= CREATE MODAL ================= -->
    <div class="modal fade" id="createModal">
      <div class="modal-dialog">
        <form id="createForm" class="modal-content" enctype="multipart/form-data">
          <div class="modal-header">
            <h5>Add Sponsor</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input name="title" class="form-control mb-3" placeholder="Sponsor Title" required>
            <input name="website" class="form-control mb-3" placeholder="Website URL">
            <!-- Add Image Upload Field -->
            <div class="mb-3">
              <label class="form-label">Sponsor Logo/Image</label>
              <input type="file" name="image" class="form-control" accept="image/*" required>
              <div class="form-text">Upload logo or banner image for this sponsor</div>
            </div>
            <select name="status" class="form-select mb-3">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ================= EDIT MODAL ================= -->
    <div class="modal fade" id="editModal">
      <div class="modal-dialog">
        <form id="editForm" class="modal-content" enctype="multipart/form-data">
          <div class="modal-header">
            <h5>Edit Sponsor</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id">
            <input name="title" class="form-control mb-3" placeholder="Sponsor Title" required>
            <input name="website" class="form-control mb-3" placeholder="Website URL">
            <!-- Add Image Upload Field for Edit -->
            <div class="mb-3">
              <label class="form-label">Sponsor Logo/Image</label>
              <input type="file" name="image" class="form-control" accept="image/*">
              <div class="form-text" id="currentImageText">Leave empty to keep current image</div>
              <div id="currentImagePreview" class="mt-2"></div>
            </div>
            <select name="status" class="form-select mb-3">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>

    <footer>
      <div class="container text-center">
        <p>All Rights Reserved. Copyright ©
          <script>document.write(new Date().getFullYear())</script> Reef Hobbyist Magazine
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const table = document.getElementById("sponsorTable");
      const pagination = document.getElementById("pagination");
      let allSponsors = [];
      let currentPage = 1;
      const itemsPerPage = 10;

      /* ================= LOAD ================= */
      async function loadSponsors() {
        const res = await fetch("/api/admin/sponsors");
        allSponsors = await res.json();
        renderTable();
        renderPagination();
      }

      function renderTable() {
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = allSponsors.slice(start, end);
        
        table.innerHTML = "";
        pageItems.forEach(s => {
          // Format the website URL properly
          let websiteUrl = s.website;
          let websiteDisplay = s.website || '';
          
          // Check if website exists and format the link properly
          if (websiteUrl) {
            // Add https:// if no protocol is specified
            if (!websiteUrl.match(/^https?:\/\//i)) {
              websiteUrl = 'https://' + websiteUrl;
            }
          }
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>
              ${s.image ? `
                <img src="${s.image}" alt="${s.title}" class="img-thumbnail" style="max-width: 80px; height: auto;">
              ` : '<span class="text-muted">No image</span>'}
            </td>
            <td>${s.title}</td>
            <td><a href="${websiteUrl}" target="_blank">${s.website || 'No website'}</a></td>
            <td><span class="badge ${s.status === 'active' ? 'bg-success' : 'bg-secondary'}">${s.status}</span></td>
            <td>${(s.updatedAt || s.createdAt || "").split("T")[0]}</td>
            <td>
              <div class="btn-group btn-group-sm" role="group">
                <button class="btn btn-outline-secondary" onclick="openEdit('${s.id}')">Edit</button>
                <button class="btn btn-outline-danger" onclick="deleteSponsor('${s.id}')">Delete</button>
              </div>
            </td>
          `;
          table.appendChild(tr);
        });
      }

      function renderPagination() {
        const totalPages = Math.ceil(allSponsors.length / itemsPerPage);
        pagination.innerHTML = "";
        
        // Previous button
        const prevLi = document.createElement("li");
        prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
        prevLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage - 1}); return false;">Previous</a>`;
        pagination.appendChild(prevLi);

        // Page numbers (show max 5 pages)
        const maxVisible = 5;
        let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
        let endPage = Math.min(totalPages, startPage + maxVisible - 1);
        
        if (endPage - startPage + 1 < maxVisible) {
          startPage = Math.max(1, endPage - maxVisible + 1);
        }

        for (let i = startPage; i <= endPage; i++) {
          const li = document.createElement("li");
          li.className = `page-item ${i === currentPage ? 'active' : ''}`;
          li.innerHTML = `<a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>`;
          pagination.appendChild(li);
        }

        // Next button
        const nextLi = document.createElement("li");
        nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
        nextLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage + 1}); return false;">Next</a>`;
        pagination.appendChild(nextLi);
      }

      function changePage(page) {
        const totalPages = Math.ceil(allSponsors.length / itemsPerPage);
        if (page < 1 || page > totalPages || page === currentPage) return;
        
        currentPage = page;
        renderTable();
        renderPagination();
      }

      window.changePage = changePage; // Make global for onclick handlers

      loadSponsors();

      /* ================= CREATE ================= */
      document.getElementById("createForm").addEventListener("submit", async e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const imageFile = formData.get('image');
        if (!imageFile || imageFile.size === 0) {
          alert('Please select an image');
          return;
        }
        const res = await fetch("/api/admin/sponsors", {
          method: "POST",
          body: formData
        });
        const json = await res.json();
        if (json.success) {
          const modalEl = document.getElementById("createModal");
          bootstrap.Modal.getInstance(modalEl).hide();
          e.target.reset();
          loadSponsors();
        } else {
          alert(json.error || "Create failed");
        }
      });

      /* ================= OPEN EDIT ================= */
      async function openEdit(id) {
        const list = await fetch("/api/admin/sponsors").then(r => r.json());
        const s = list.find(x => x.id === id);
        const f = document.forms.editForm;
        f.id.value = s.id;
        f.title.value = s.title;
        f.website.value = s.website;
        f.status.value = s.status;
        const preview = document.getElementById('currentImagePreview');
        const text = document.getElementById('currentImageText');
        if (s.image) {
          preview.innerHTML = `
            <p class="small text-muted">Current image:</p>
            <img src="${s.image}" alt="Current" class="img-thumbnail" style="max-width: 150px;">
          `;
          text.textContent = 'Leave empty to keep current image';
        } else {
          preview.innerHTML = '<p class="text-muted small">No image currently set</p>';
          text.textContent = 'Upload an image';
        }
        new bootstrap.Modal(document.getElementById("editModal")).show();
      }

      /* ================= UPDATE ================= */
      document.getElementById("editForm").addEventListener("submit", async e => {
        e.preventDefault();
        const id = e.target.id.value;
        const formData = new FormData(e.target);
        const res = await fetch("/api/admin/sponsors/" + id, {
          method: "PATCH",
          body: formData
        });
        const json = await res.json();
        if (json.success) {
          bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
          loadSponsors();
        } else {
          alert(json.error || "Update failed");
        }
      });

      /* ================= DELETE ================= */
      async function deleteSponsor(id) {
        if (!confirm("Delete this sponsor?")) return;
        const res = await fetch("/api/admin/sponsors/" + id, {
          method: "DELETE"
        });
        const json = await res.json();
        if (json.success) loadSponsors();
      }
    </script>
  </body>
</html>
