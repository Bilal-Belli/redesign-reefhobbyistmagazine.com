<!DOCTYPE html>
<html>

    <head>
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-87FCYMD0DT"></script>
        <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
        
          gtag('config', 'G-87FCYMD0DT');
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Admin – Stores</title>
        <link rel="icon" type="image/png" href="/img/favicon.ico">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/style/admin.css" />
    </head>

    <body class="bg-light">
        <!-- ================= NAVBAR ================= -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-black">
            <div class="container">
                <a class="navbar-brand" href="/admin"><img src="../img/logo.jpg" alt="Magazine Logo"
                        class="img-fluid"></a>
                <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div id="nav" class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item btn btn-outline-warning btn-sm mx-4"><a class="nav-link active"
                                href="/admin">Admin Home</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- ================= DASHBOARD ================= -->
        <div class="container-fluid px-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>🏪 Manage Stores</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
                    Add Store
                </button>
            </div>
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle mb-2">
                            <thead class="table-dark">
                                <tr>
                                    <th>Name</th>
                                    <th>Status</th>
                                    <th>Address</th>
                                    <th>Maps URL</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="storeTable"></tbody>
                        </table>
                    </div>
                    <!-- Pagination -->
                    <nav aria-label="Stores pagination">
                        <ul class="pagination justify-content-center mb-0" id="pagination"></ul>
                    </nav>
                </div>
            </div>
        </div>

        <!-- ================= CREATE MODAL ================= -->
        <div class="modal fade" id="createModal">
            <div class="modal-dialog">
                <form id="createForm" class="modal-content">
                    <div class="modal-header">
                        <h5>Add Store</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input name="store_name" class="form-control mb-3" placeholder="Store Name" required>
                        <textarea name="address" class="form-control mb-3" placeholder="Address"></textarea>
                        <textarea name="mapsURL" class="form-control mb-3" placeholder="Google Maps URL"></textarea>
                        <select name="status" class="form-select mb-3">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ================= EDIT MODAL ================= -->
        <div class="modal fade" id="editModal">
            <div class="modal-dialog">
                <form id="editForm" class="modal-content">
                    <div class="modal-header">
                        <h5>Edit Store</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="id">
                        <input name="store_name" class="form-control mb-3" placeholder="Store Name" required>
                        <textarea name="address" class="form-control mb-3" placeholder="Address"></textarea>
                        <textarea name="mapsURL" class="form-control mb-3" placeholder="Google Maps URL"></textarea>
                        <select name="status" class="form-select mb-3">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>

        <footer>
            <div class="container text-center">
                <p>All Rights Reserved. Copyright ©
                    <script>document.write(new Date().getFullYear())</script> Reef Hobbyist Magazine
                </p>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            const table = document.getElementById("storeTable");
            const pagination = document.getElementById("pagination");
            let allStores = [];
            let currentPage = 1;
            const itemsPerPage = 10;

            /* ================= LOAD ================= */
            async function loadStores() {  // FIXED: was loadNews()
                const res = await fetch("/api/admin/stores");
                allStores = await res.json();
                renderTable();
                renderPagination();
            }

            function renderTable() {
                const start = (currentPage - 1) * itemsPerPage;
                const end = start + itemsPerPage;
                const pageItems = allStores.slice(start, end);
                
                table.innerHTML = "";
                pageItems.forEach(n => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${n.store_name}</td>
                        <td><span class="badge ${n.status === 'active' ? 'bg-success' : 'bg-secondary'}">${n.status}</span></td>
                        <td>${n.address || ""}</td>
                        <td><a class="active" href="${n.mapsURL}">Link</a></td>
                        <td>
                            <div class="btn-group btn-group-sm" role="group">
                                <button class="btn btn-outline-secondary" onclick="openEdit('${n.id}')">Edit</button>
                                <button class="btn btn-outline-danger" onclick="deleteStore('${n.id}')">Delete</button>  <!-- FIXED: was deleteNews -->
                            </div>
                        </td>
                    `;
                    table.appendChild(tr);
                });
            }

            function renderPagination() {
                const totalPages = Math.ceil(allStores.length / itemsPerPage);
                pagination.innerHTML = "";
                
                // Previous button
                const prevLi = document.createElement("li");
                prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
                prevLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage - 1}); return false;">Previous</a>`;
                pagination.appendChild(prevLi);

                // Page numbers (show max 5 pages)
                const maxVisible = 5;
                let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
                let endPage = Math.min(totalPages, startPage + maxVisible - 1);
                
                if (endPage - startPage + 1 < maxVisible) {
                    startPage = Math.max(1, endPage - maxVisible + 1);
                }

                for (let i = startPage; i <= endPage; i++) {
                    const li = document.createElement("li");
                    li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                    li.innerHTML = `<a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>`;
                    pagination.appendChild(li);
                }

                // Next button
                const nextLi = document.createElement("li");
                nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
                nextLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage + 1}); return false;">Next</a>`;
                pagination.appendChild(nextLi);
            }

            function changePage(page) {
                const totalPages = Math.ceil(allStores.length / itemsPerPage);
                if (page < 1 || page > totalPages || page === currentPage) return;
                
                currentPage = page;
                renderTable();
                renderPagination();
            }

            window.changePage = changePage; // Make global for onclick handlers

            loadStores();  // FIXED: was loadNews()

            /* ================= CREATE ================= */
            document.getElementById("createForm").addEventListener("submit", async e => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const payload = {
                    store_name: fd.get("store_name"),
                    address: fd.get("address"),
                    status: fd.get("status"),
                    mapsURL: fd.get("mapsURL")
                };
                const res = await fetch("/api/admin/stores", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                if (json.success) {
                    bootstrap.Modal.getInstance(document.getElementById("createModal")).hide();
                    e.target.reset();
                    loadStores();  // FIXED: was loadNews()
                } else alert(json.error || "Create failed");
            });

            /* ================= OPEN EDIT ================= */
            async function openEdit(id) {
                const list = await fetch("/api/admin/stores").then(r => r.json());
                const n = list.find(x => x.id === id);
                const f = document.forms.editForm;
                f.id.value = n.id;
                f.store_name.value = n.store_name;
                f.address.value = n.address || "";
                f.status.value = n.status;
                f.mapsURL.value = n.mapsURL;
                new bootstrap.Modal(document.getElementById("editModal")).show();
            }

            /* ================= UPDATE ================= */
            document.getElementById("editForm").addEventListener("submit", async e => {
                e.preventDefault();
                const id = e.target.id.value;
                const payload = {
                    store_name: e.target.store_name.value,
                    address: e.target.address.value,
                    status: e.target.status.value,
                    mapsURL: e.target.mapsURL.value
                };
                const res = await fetch("/api/admin/stores/" + id, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                if (json.success) {
                    bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
                    loadStores();  // FIXED: was loadNews()
                } else alert(json.error || "Update failed");
            });

            /* ================= DELETE ================= */
            async function deleteStore(id) {  // FIXED: was deleteNews()
                if (!confirm("Delete this store item?")) return;
                const res = await fetch("/api/admin/stores/" + id, { method: "DELETE" });
                const json = await res.json();
                if (json.success) loadStores();  // FIXED: was loadNews()
            }

            window.deleteStore = deleteStore;  // Make global for onclick handlers
        </script>
    </body>

</html>
